<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trackeep Saver</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --bg-soft: #0f1727;
      --panel: #111a2d;
      --panel-2: #161f33;
      --border: #24324f;
      --text: #edf2ff;
      --text-soft: #b3bfd9;
      --accent: #5c86ff;
      --accent-2: #3f65f1;
      --ok: #3ed6a1;
      --error: #ff7f9f;
      --warn: #ffb454;
      --radius: 12px;
      --radius-lg: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 390px;
      max-width: 420px;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(circle at 0 0, rgba(92, 134, 255, 0.22), transparent 38%),
        radial-gradient(circle at 100% 0, rgba(66, 202, 255, 0.14), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .shell {
      border: 1px solid rgba(130, 158, 229, 0.22);
      border-radius: 0;
      overflow: hidden;
    }

    .header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(130, 158, 229, 0.18);
      background: linear-gradient(180deg, rgba(16, 24, 43, 0.88), rgba(12, 18, 32, 0.96));
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(43, 85, 220, 0.45);
    }

    .title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 2px 0 0;
      font-size: 11px;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 230px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-mini {
      border: 1px solid rgba(136, 157, 201, 0.32);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      padding: 7px 10px;
      cursor: pointer;
      line-height: 1;
    }

    .btn-mini:hover {
      border-color: rgba(162, 181, 224, 0.6);
      background: rgba(255, 255, 255, 0.08);
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #6e7d9f;
      box-shadow: 0 0 0 3px rgba(111, 128, 168, 0.18);
    }

    .status-indicator.connected {
      background: var(--ok);
      box-shadow: 0 0 0 3px rgba(62, 214, 161, 0.2);
    }

    .status-indicator.error {
      background: var(--error);
      box-shadow: 0 0 0 3px rgba(255, 127, 159, 0.2);
    }

    .content-type-indicator {
      margin-top: 8px;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid rgba(126, 148, 196, 0.3);
      border-radius: 999px;
      background: rgba(31, 45, 76, 0.72);
      padding: 4px 10px;
      font-size: 11px;
      color: #d7e4ff;
    }

    .content {
      padding: 12px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }

    .tab {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text-soft);
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab.active {
      border-color: rgba(120, 149, 228, 0.8);
      background: linear-gradient(180deg, rgba(90, 123, 220, 0.32), rgba(29, 44, 82, 0.84));
      color: var(--text);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin: 0 0 5px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="url"],
    input[type="file"],
    textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(6, 10, 18, 0.42);
      color: var(--text);
      padding: 10px 11px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(132, 166, 255, 0.86);
      box-shadow: 0 0 0 3px rgba(92, 134, 255, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(6, 10, 18, 0.32);
      padding: 9px 10px;
    }

    .checkbox-group label {
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
    }

    .suggested-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .suggested-tag {
      border-radius: 999px;
      border: 1px solid rgba(127, 159, 237, 0.44);
      background: rgba(64, 90, 165, 0.35);
      color: #dce8ff;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .suggested-tag:hover {
      background: rgba(78, 108, 199, 0.56);
    }

    .tags-help {
      margin-top: 5px;
      font-size: 10px;
      color: #91a2ca;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 20px rgba(44, 81, 204, 0.35);
    }

    .btn-primary:hover {
      filter: brightness(1.06);
    }

    .btn:disabled,
    .btn-mini:disabled,
    .tab:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .icon-spin {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .status-message {
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid transparent;
      padding: 9px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-message.success {
      background: rgba(62, 214, 161, 0.12);
      border-color: rgba(62, 214, 161, 0.35);
      color: #73ecc0;
    }

    .status-message.error {
      background: rgba(255, 127, 159, 0.12);
      border-color: rgba(255, 127, 159, 0.35);
      color: #ff9ab4;
    }

    .status-message.info {
      background: rgba(92, 134, 255, 0.14);
      border-color: rgba(92, 134, 255, 0.36);
      color: #bfd3ff;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="header-row">
        <div class="logo-block">
          <span class="logo">T</span>
          <div>
            <p class="title">Trackeep Saver</p>
            <p id="statusText" class="subtitle">Preparing your connection...</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="quickSaveBtn" class="btn-mini" title="Quick save current page">Quick Save</button>
          <button id="openOptions" class="btn-mini" title="Extension options">Options</button>
        </div>
      </div>
      <div class="status-line">
        <span id="statusIndicator" class="status-indicator"></span>
        <span>Connection status</span>
      </div>
      <div id="contentTypeIndicator" class="content-type-indicator" style="display: none;"></div>
    </header>

    <main class="content">
      <div class="tabs">
        <button class="tab active" data-tab="bookmark">Bookmark</button>
        <button class="tab" data-tab="file">File Upload</button>
      </div>

      <section class="tab-content active" id="bookmark-tab">
        <div class="panel">
          <h2>Save Current Page</h2>
          <div class="form-group">
            <label for="bookmarkTitle">Title</label>
            <input type="text" id="bookmarkTitle" placeholder="Page title" />
          </div>
          <div class="form-group">
            <label for="bookmarkUrl">URL</label>
            <input type="url" id="bookmarkUrl" placeholder="https://example.com" />
          </div>
          <div class="form-group">
            <label for="bookmarkDescription">Description</label>
            <textarea id="bookmarkDescription" rows="3" placeholder="Optional context"></textarea>
          </div>
          <div class="form-group">
            <label for="bookmarkTags">Tags</label>
            <input type="text" id="bookmarkTags" placeholder="tag1, tag2, tag3" />
            <div id="suggestedTags" class="suggested-tags" style="display: none;"></div>
            <div class="tags-help">Suggested tags appear based on detected content type.</div>
          </div>
          <div class="form-group">
            <div class="checkbox-group">
              <input id="bookmarkPublic" type="checkbox" />
              <label for="bookmarkPublic">Make bookmark public</label>
            </div>
          </div>
          <button class="btn btn-primary" id="saveBookmarkBtn">Save Bookmark</button>
        </div>
      </section>

      <section class="tab-content" id="file-tab">
        <div class="panel">
          <h2>Upload File</h2>
          <div class="form-group">
            <label for="fileInput">Choose File</label>
            <input id="fileInput" type="file" />
          </div>
          <div class="form-group">
            <label for="fileDescription">Description</label>
            <textarea id="fileDescription" rows="3" placeholder="Describe this upload"></textarea>
          </div>
          <button class="btn btn-primary" id="uploadFileBtn">Upload File</button>
        </div>
      </section>

      <div id="statusMessage" class="status-message" style="display: none;"></div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
