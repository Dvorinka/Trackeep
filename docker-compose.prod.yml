version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: trackeep-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-trackeep}
      POSTGRES_USER: ${DB_USER:-trackeep}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trackeep} -d ${DB_NAME:-trackeep}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trackeep-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:latest
    container_name: trackeep-dragonfly
    ports:
      - "${DRAGONFLY_HOST_PORT:-6380}:6379"
    volumes:
      - dragonfly_data:/data
    command: >
      dragonfly
      --requirepass=${DRAGONFLY_PASSWORD:?DRAGONFLY_PASSWORD is required}
      --proactor_threads=4
      --maxmemory=2gb
      --maxmemory-policy=allkeys-lru
      --save_schedule=*:30
      --dir=/data
    environment:
      - DRAGONFLY_PASSWORD=${DRAGONFLY_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${DRAGONFLY_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trackeep-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

  trackeep-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - GO_VERSION=1.22
    container_name: trackeep-backend
    ports:
      - "${BACKEND_HOST_PORT:-8080}:${BACKEND_PORT:-8080}"
    env_file:
      - .env
    environment:
      - APP_VERSION=${APP_VERSION:-1.2.5}
      - BACKEND_PORT=${BACKEND_PORT:-8080}
      - FRONTEND_PORT=${FRONTEND_PORT:-80}
      - GIN_MODE=release
      - DB_HOST=postgres
      - DRAGONFLY_ADDR=dragonfly:6379
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${BACKEND_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trackeep-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trackeep-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=20
        - VITE_API_URL=${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-8080}}
    container_name: trackeep-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:${BACKEND_HOST_PORT:-8080}}
      - VITE_DEMO_MODE=${VITE_DEMO_MODE:-false}
    depends_on:
      - trackeep-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trackeep-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  dragonfly_data:
    driver: local

networks:
  trackeep-network:
    driver: bridge
